name: Build smartwatch report

on:
  workflow_dispatch:
  push:
    paths:
      - "water_temperatures.csv"
      - "data/apple_health_water_temperature_recent.csv"
      - "scripts/merge_apple_health_water_temps.py"
      - "scripts/build_smartwatch_report.py"
      - "requirements.txt"
      - ".github/workflows/build-smartwatch-report.yml"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Merge Apple Health water temperature data
        run: python scripts/merge_apple_health_water_temps.py

      - name: Build smartwatch report
        run: python scripts/build_smartwatch_report.py data/apple_health_water_temperature_raw.csv

      - name: Commit generated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update smartwatch report"
          file_pattern: "data/apple_health_water_temperature_raw.csv smartwatch.html smartwatch_daily_minimums.json reports/"
          push_options: "--force-with-lease"