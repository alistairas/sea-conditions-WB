name: Update sea temperature data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 8 * * *"

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run SST update script
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python3 scripts/update_sst.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git commit -m "Update sea temperature data" || echo "No changes to commit"
          git pull --rebase origin main
          git push
