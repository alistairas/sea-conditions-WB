<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tides | Whitley Bay</title>

<style>
body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f4f7f8;
    color:#102027;
}

.page{
    max-width:520px;
    margin:auto;
    padding:24px 18px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:20px;
}

.eyebrow{
    font-size:14px;
    color:#607d8b;
}

h1{
    margin:0;
    font-size:30px;
}

.refresh-btn{
    border:none;
    background:white;
    border-radius:999px;
    padding:8px 14px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.day-title{
    font-weight:700;
    font-size:18px;
    margin-bottom:10px;
}

.tide{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:10px 0;
    border-bottom:1px solid #eceff1;
}

.tide:last-child{
    border-bottom:none;
}

.left{
    display:flex;
    flex-direction:column;
}

.type{
    font-weight:600;
}

.time{
    color:#607d8b;
    font-size:14px;
}

.height{
    font-size:18px;
    font-weight:700;
}

.flag{
    margin-top:4px;
    font-size:13px;
    color:#1565c0;
}

.footer{
    font-size:12px;
    color:#78909c;
    margin-top:24px;
    line-height:1.5;
}
</style>

</head>

<body>

<div class="page">

<div class="header">
<div>
<div class="eyebrow">Whitley Bay</div>
<h1>Tides</h1>
</div>

<button onclick="location.reload()" class="refresh-btn">
↻
</button>
</div>

<div id="tides"></div>

<div class="footer">
Predictions generated from Open Waters using the North Shields harmonic reference station.<br><br>
For recreational guidance only. Not for navigation.
</div>

</div>

<script>

function formatTime(iso){
    return new Date(iso).toLocaleTimeString("en-GB",{
        timeZone:"Europe/London",
        hour:"2-digit",
        minute:"2-digit"
    });
}

function formatDate(iso){

    return new Date(iso).toLocaleDateString("en-GB",{
        weekday:"long",
        day:"numeric",
        month:"long"
    });

}

function tideFlag(t){

    if(t.type==="High" && t.height_m>=4.75)
        return "🌊 Very high tide – beach greatly reduced.";

    if(t.type==="High" && t.height_m>=4.50)
        return "🌊 High tide – less beach available.";

    if(t.type==="Low" && t.height_m<=1.05)
        return "🪨 Very low tide – rocks exposed and a long walk to the sea.";

    if(t.type==="Low" && t.height_m<=1.30)
        return "🪨 Low tide – longer walk to the sea.";

    return "";
}

async function loadTides(){

    const response=await fetch("tides.json");
    const data=await response.json();

    const container=document.getElementById("tides");

    let currentDay="";

    data.events.forEach(event=>{

        const day=formatDate(event.time);

        if(day!==currentDay){

            currentDay=day;

            container.innerHTML+=`
            <div class="card">
                <div class="day-title">${day}</div>
                <div id="day-${day.replace(/\s/g,'')}"></div>
            </div>
            `;

        }

        document.querySelector(`#day-${day.replace(/\s/g,'')}`).innerHTML+=`

        <div class="tide">

            <div class="left">

                <div class="type">${event.type}</div>

                <div class="time">${formatTime(event.time)}</div>

                ${tideFlag(event)?`<div class="flag">${tideFlag(event)}</div>`:""}

            </div>

            <div class="height">${event.height_m.toFixed(2)} m</div>

        </div>

        `;

    });

}

loadTides();

</script>

</body>
</html>
